kind = "mobile"
previewPath = "/movil/"
title = "Coordina ADG Móvil"
version = "1.0.0"
id = "artifacts/movil"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/movil/" ]
localPort = 20788

[services.development]
run = "pnpm --filter @workspace/movil run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/movil", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/movil", "run", "serve" ]

[services.env]
PORT = "20788"
BASE_PATH = "/movil/"
