components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    TokenPath:
      name: token
      in: path
      required: true
      schema:
        type: string
    StatusQuery:
      name: status
      in: query
      schema:
        type: string
    RoleQuery:
      name: role
      in: query
      schema:
        $ref: "#/components/schemas/Role"
    ProvinceQuery:
      name: provinceId
      in: query
      schema:
        type: integer
    IslandQuery:
      name: islandId
      in: query
      schema:
        type: integer
    MunicipalityQuery:
      name: municipalityId
      in: query
      schema:
        type: integer
    CenterQuery:
      name: centerId
      in: query
      schema:
        type: integer
    SearchQuery:
      name: search
      in: query
      schema:
        type: string
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
      required: [message]
    OkResult:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
    IntegrationStatus:
      type: object
      properties:
        configured:
          type: boolean
      required: [configured]
    Role:
      type: string
      enum:
        - superadmin
        - coordinator
        - prospector
        - department_head
        - teacher
        - student
    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]
    AuthResult:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        status:
          type: string
        provinceId:
          type: integer
          nullable: true
        centerId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, status]
    UpdateUserInput:
      type: object
      properties:
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        status:
          type: string
        provinceId:
          type: integer
          nullable: true
        centerId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
    InvitationPublic:
      type: object
      properties:
        email:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        inviterName:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [email, role, expiresAt]
    Invitation:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        provinceId:
          type: integer
          nullable: true
        centerId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
        status:
          type: string
        expiresAt:
          type: string
          format: date-time
        usedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, code, email, role, status, expiresAt]
    CreateInvitationInput:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        provinceId:
          type: integer
          nullable: true
        centerId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
        expiresInHours:
          type: integer
          default: 72
      required: [email, role]
    InvitationCreated:
      type: object
      properties:
        invitation:
          $ref: "#/components/schemas/Invitation"
        inviteUrl:
          type: string
        emailSent:
          type: boolean
        emailPending:
          type: boolean
          description: True when Resend is not configured and the email could not be sent
      required: [invitation, inviteUrl, emailSent, emailPending]
    RegisterInput:
      type: object
      properties:
        token:
          type: string
        name:
          type: string
        password:
          type: string
      required: [token, password]
    Province:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
      required: [id, name]
    CreateProvinceInput:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
      required: [name]
    Island:
      type: object
      properties:
        id:
          type: integer
        provinceId:
          type: integer
        name:
          type: string
      required: [id, provinceId, name]
    Municipality:
      type: object
      properties:
        id:
          type: integer
        islandId:
          type: integer
        name:
          type: string
      required: [id, islandId, name]
    Center:
