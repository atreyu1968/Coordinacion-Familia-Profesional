          type: integer
        name:
          type: string
        code:
          type: string
        provinceId:
          type: integer
          nullable: true
        islandId:
          type: integer
          nullable: true
        municipalityId:
          type: integer
          nullable: true
        address:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        phone:
          type: string
          nullable: true
        email:
