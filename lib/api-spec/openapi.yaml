openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Coordina ADG API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and cascade registration
  - name: invitations
    description: Cascade invitation codes
  - name: users
    description: User management
  - name: geo
    description: Provinces, islands and municipalities
  - name: centers
    description: Educational centers directory and training offer
  - name: departments
    description: Center departments
  - name: academics
    description: Modules, groups, teaching assignments and resources
  - name: ai
    description: DeepSeek AI assistant
  - name: fct
    description: FCT support, company alerts and GDCAN
  - name: surveys
    description: Surveys and voting
  - name: events
    description: Events, accreditations, staff, spaces and calendar
  - name: messaging
    description: Chat, announcements and notifications
  - name: dashboard
    description: Statistics and AI annual reports
  - name: settings
    description: Superadmin control panel and API credentials

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          $ref: "#/components/responses/Error"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"
  /auth/invitations/{token}:
    get:
      operationId: getInvitationByToken
      tags: [auth]
      summary: Resolve a magic invitation token
      description: Returns invitation details so the registration form can be prefilled. Fails if expired or used.
      parameters:
        - $ref: "#/components/parameters/TokenPath"
      responses:
        "200":
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationPublic"
        "404":
          $ref: "#/components/responses/Error"
  /auth/register:
    post:
      operationId: registerWithToken
      tags: [auth]
      summary: Complete registration using an invitation token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Registered and authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # Invitations (cascade codes)
  # ---------------------------------------------------------------------------
  /invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List invitation codes the caller has generated or can manage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StatusQuery"
      responses:
        "200":
          description: Invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Generate an invitation code and send it by email (Resend)
      description: Coordinators generate codes for department heads and prospectors; department heads for teachers. Sends a magic link via Resend when configured.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationInput"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCreated"
        "403":
          $ref: "#/components/responses/Error"
  /invitations/{id}:
    delete:
      operationId: revokeInvitation
      tags: [invitations]
      summary: Revoke a pending invitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Revoked
  /invitations/{id}/resend:
    post:
      operationId: resendInvitation
      tags: [invitations]
      summary: Resend an invitation email
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCreated"

  # ---------------------------------------------------------------------------
  # Users
  # ---------------------------------------------------------------------------
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users within the caller's scope
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleQuery"
        - $ref: "#/components/parameters/ProvinceQuery"
        - $ref: "#/components/parameters/CenterQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate a user (soft delete)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deactivated

  # ---------------------------------------------------------------------------
  # Geo
  # ---------------------------------------------------------------------------
  /provinces:
    get:
      operationId: listProvinces
      tags: [geo]
      summary: List provinces
      responses:
        "200":
          description: Provinces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Province"
    post:
      operationId: createProvince
      tags: [geo]
      summary: Create a province coordination (superadmin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProvinceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Province"
  /islands:
    get:
      operationId: listIslands
      tags: [geo]
      parameters:
        - $ref: "#/components/parameters/ProvinceQuery"
      responses:
        "200":
          description: Islands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Island"
  /municipalities:
    get:
      operationId: listMunicipalities
      tags: [geo]
      parameters:
        - $ref: "#/components/parameters/IslandQuery"
      responses:
        "200":
          description: Municipalities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Municipality"

  # ---------------------------------------------------------------------------
  # Centers
  # ---------------------------------------------------------------------------
  /centers:
    get:
      operationId: listCenters
      tags: [centers]
      summary: List centers, filterable by province/island/municipality
      parameters:
        - $ref: "#/components/parameters/ProvinceQuery"
        - $ref: "#/components/parameters/IslandQuery"
        - $ref: "#/components/parameters/MunicipalityQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Centers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Center"
    post:
      operationId: createCenter
      tags: [centers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCenterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Center"
  /centers/{id}:
    get:
      operationId: getCenter
      tags: [centers]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Center
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CenterDetail"
    patch:
      operationId: updateCenter
      tags: [centers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCenterInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Center"
    delete:
      operationId: deleteCenter
      tags: [centers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
  /centers/{id}/training-offer:
    get:
      operationId: listTrainingOffer
      tags: [centers]
      summary: Training offer (cycles) for a center
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Training offer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingOffer"
    post:
      operationId: addTrainingOffer
      tags: [centers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainingOfferInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingOffer"

  # ---------------------------------------------------------------------------
  # Departments
  # ---------------------------------------------------------------------------
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CenterQuery"
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  # ---------------------------------------------------------------------------
  # Academics
  # ---------------------------------------------------------------------------
  /modules:
    get:
      operationId: listModules
      tags: [academics]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CenterQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"
    post:
      operationId: createModule
      tags: [academics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
  /groups:
    get:
      operationId: listGroups
      tags: [academics]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CenterQuery"
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [academics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
  /teaching-assignments:
    get:
      operationId: listTeachingAssignments
      tags: [academics]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CenterQuery"
        - name: teacherId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeachingAssignment"
    post:
      operationId: createTeachingAssignment
      tags: [academics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeachingAssignmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeachingAssignment"
  /teaching-assignments/transfer:
    post:
      operationId: transferTeachingAssignments
      tags: [academics]
      summary: Transfer a teacher's modules to another teacher, preserving resource authorship
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferInput"
      responses:
        "200":
          description: Transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
  /resources:
    get:
      operationId: listResources
      tags: [academics]
      summary: Resource and programming repository
      security:
        - bearerAuth: []
      parameters:
        - name: moduleId
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/CenterQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [academics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
  /resources/{id}:
    delete:
      operationId: deleteResource
      tags: [academics]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted

  # ---------------------------------------------------------------------------
  # AI assistant
  # ---------------------------------------------------------------------------
  /ai/status:
    get:
      operationId: getAiStatus
      tags: [ai]
      summary: Whether the DeepSeek assistant is configured
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationStatus"
  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send a message to the DeepSeek assistant
      description: context selects the knowledge base (curriculum or gdcan). Returns a configuration error when no key is set.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatInput"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatReply"
        "503":
          $ref: "#/components/responses/Error"

  # ---------------------------------------------------------------------------
  # FCT
  # ---------------------------------------------------------------------------
  /company-alerts:
    get:
      operationId: listCompanyAlerts
      tags: [fct]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProvinceQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Company alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyAlert"
    post:
      operationId: createCompanyAlert
      tags: [fct]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyAlertInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyAlertCreated"
  /company-alerts/{id}:
    delete:
      operationId: deleteCompanyAlert
      tags: [fct]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
  /gdcan-resources:
    get:
      operationId: listGdcanResources
      tags: [fct]
      summary: GDCAN manuals and FAQs
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [manual, faq, link]
      responses:
        "200":
          description: GDCAN resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GdcanResource"
    post:
      operationId: createGdcanResource
      tags: [fct]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGdcanResourceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdcanResource"

  # ---------------------------------------------------------------------------
  # Surveys & voting
  # ---------------------------------------------------------------------------
  /surveys:
    get:
      operationId: listSurveys
      tags: [surveys]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/ProvinceQuery"
      responses:
        "200":
          description: Surveys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Survey"
    post:
      operationId: createSurvey
      tags: [surveys]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSurveyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
  /surveys/{id}:
    get:
      operationId: getSurvey
      tags: [surveys]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Survey with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyDetail"
    delete:
      operationId: deleteSurvey
      tags: [surveys]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
  /surveys/{id}/responses:
    post:
      operationId: submitSurveyResponse
      tags: [surveys]
      summary: Submit a response or vote (anonymous when the survey is anonymous)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSurveyResponseInput"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
  /surveys/{id}/results:
    get:
      operationId: getSurveyResults
      tags: [surveys]
      summary: Aggregated, real-time results
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResults"

  # ---------------------------------------------------------------------------
  # Events
  # ---------------------------------------------------------------------------
  /events:
    get:
      operationId: listEvents
      tags: [events]
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [canarias_skills, jornada, other]
        - $ref: "#/components/parameters/ProvinceQuery"
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
    delete:
      operationId: deleteEvent
      tags: [events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
  /events/{id}/accreditations:
    get:
      operationId: listAccreditations
      tags: [events]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Accreditations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Accreditation"
    post:
      operationId: createAccreditation
      tags: [events]
      summary: Create an accreditation and send the QR pass by email (Resend)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccreditationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Accreditation"
  /accreditations/check-in:
    post:
      operationId: checkInAccreditation
      tags: [events]
      summary: Validate a QR token at event check-in (used by the mobile scanner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "200":
          description: Check-in result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResult"
  /events/{id}/staff:
