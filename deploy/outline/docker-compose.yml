# ===========================================================================
# Coordina ADG — documentation wiki stack (Outline).
#
# Self-hosted, optional add-on for the main platform. Outline stores the
# per-module documentation (one collection per module) and provides a rich
# wiki/knowledge-base UI. Single sign-on is handled by the api-server acting as
# an OIDC provider (Outline's built-in generic OIDC client is configured to
# point at it).
#
# Unlike the collaborative space (Nextcloud), Outline does NOT support being
# served from a subpath: it must live on its OWN SUBDOMAIN (e.g.
# https://docs.<domain>). install-outline.sh creates a dedicated nginx server
# block and certbot certificate for that subdomain.
#
# Bring it up with:
#   cd deploy/outline && cp .env.example .env && $EDITOR .env
#   docker compose up -d
#
# All values come from the local .env (see .env.example). Nothing here is
# specific to a machine, so the file is safe to commit.
# ===========================================================================

services:
  outline-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - outline-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${OUTLINE_DB_NAME:-outline}
      POSTGRES_USER: ${OUTLINE_DB_USER:-outline}
      POSTGRES_PASSWORD: ${OUTLINE_DB_PASSWORD:?set OUTLINE_DB_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OUTLINE_DB_USER:-outline}"]
      interval: 10s
      timeout: 5s
      retries: 5

  outline-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for uploaded images/attachments. Outline talks
  # to it over the S3 API; the host nginx exposes it on its own subdomain
  # (OUTLINE_S3_PUBLIC_URL) so the browser can fetch pre-signed download URLs.
  outline-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      # Loopback by default; the host nginx terminates TLS and proxies the S3 API
      # in. Set OUTLINE_BIND_ADDR in .env (e.g. the LAN IP, or 0.0.0.0) when the
      # reverse proxy / Cloudflare Tunnel runs on a DIFFERENT host and must reach
      # this port across the network.
      - "${OUTLINE_BIND_ADDR:-127.0.0.1}:${OUTLINE_S3_PORT:-3501}:9000"
    volumes:
      - outline-minio:/data
    environment:
      MINIO_ROOT_USER: ${OUTLINE_S3_ACCESS_KEY:?set OUTLINE_S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${OUTLINE_S3_SECRET_KEY:?set OUTLINE_S3_SECRET_KEY in .env}
      # Pre-signed URLs are generated against the public origin, so MinIO must
      # validate request signatures against that host, not the internal one.
      MINIO_SERVER_URL: ${OUTLINE_S3_PUBLIC_URL:?set OUTLINE_S3_PUBLIC_URL in .env}
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket on first boot (idempotent). The bucket stays
  # private — Outline serves files via pre-signed URLs.
  outline-minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      outline-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set s3 http://outline-minio:9000 '${OUTLINE_S3_ACCESS_KEY}' '${OUTLINE_S3_SECRET_KEY}' &&
      mc mb --ignore-existing s3/${OUTLINE_S3_BUCKET:-outline} &&
      echo 'bucket ready';
      "
    restart: "no"

  outline:
    image: outlinewiki/outline:0.82.0
    restart: unless-stopped
    depends_on:
      outline-db:
        condition: service_healthy
      outline-redis:
        condition: service_started
      outline-minio:
        condition: service_healthy
    ports:
      # Loopback by default; the host nginx terminates TLS and proxies in. Set
      # OUTLINE_BIND_ADDR in .env (e.g. the LAN IP, or 0.0.0.0) when the reverse
      # proxy / Cloudflare Tunnel runs on a DIFFERENT host and must reach this
      # port across the network.
      - "${OUTLINE_BIND_ADDR:-127.0.0.1}:${OUTLINE_PORT:-3500}:3000"
    environment:
      NODE_ENV: production
      # Two independent 32-byte secrets (see .env). Rotating SECRET_KEY logs
      # everyone out; rotating UTILS_SECRET invalidates internal tokens.
      SECRET_KEY: ${OUTLINE_SECRET_KEY:?set OUTLINE_SECRET_KEY in .env}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET:?set OUTLINE_UTILS_SECRET in .env}
      DATABASE_URL: postgres://${OUTLINE_DB_USER:-outline}:${OUTLINE_DB_PASSWORD}@outline-db:5432/${OUTLINE_DB_NAME:-outline}
      PGSSLMODE: disable
      REDIS_URL: redis://outline-redis:6379
      # Public origin (its own subdomain). Outline bakes this into links/emails.
      URL: ${OUTLINE_URL:?set OUTLINE_URL in .env}
      PORT: "3000"
      # Outline redirects everything to https when this is true. The installer
      # sets it to false (and writes an http:// URL) when no TLS certificate is
      # available, so the wiki is still reachable over plain HTTP. SSO needs
      # https, so a certificate is strongly recommended.
      FORCE_HTTPS: ${OUTLINE_FORCE_HTTPS:-true}
      # --- S3-compatible storage (MinIO) -------------------------------------
      FILE_STORAGE: s3
      FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
      AWS_ACCESS_KEY_ID: ${OUTLINE_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${OUTLINE_S3_SECRET_KEY}
      AWS_REGION: ${OUTLINE_S3_REGION:-us-east-1}
      AWS_S3_UPLOAD_BUCKET_NAME: ${OUTLINE_S3_BUCKET:-outline}
      # Public, browser-reachable S3 endpoint (host nginx → MinIO). Pre-signed
      # URLs are minted against this origin.
      AWS_S3_UPLOAD_BUCKET_URL: ${OUTLINE_S3_PUBLIC_URL}
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private
      # --- Single sign-on against the Coordina ADG api-server (OIDC) ---------
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?set OIDC_CLIENT_ID in .env}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?set OIDC_CLIENT_SECRET in .env}
      OIDC_AUTH_URI: https://${APP_DOMAIN:?set APP_DOMAIN in .env}/api/oidc/authorize
      OIDC_TOKEN_URI: https://${APP_DOMAIN}/api/oidc/token
      OIDC_USERINFO_URI: https://${APP_DOMAIN}/api/oidc/userinfo
      OIDC_USERNAME_CLAIM: email
      OIDC_DISPLAY_NAME: Coordina ADG
      OIDC_SCOPES: openid profile email

volumes:
  outline-db:
  outline-minio:
